default_streams:
- object_positions/compressed_images
- left/ft_states
- left/gripper_states
- left/robot_pose
- /left/cam/color/compressed
- /exo/cam/color/compressed
- /right/cam/color/compressed
- /left/robot/current/world_eef_pose
- /left/ft/states
- /left/gripper/states
- /left/robot/current/joint_position
- /left/robot/current/joint_velocity
- /recog/states
overlay:
  enabled: true
  precision: 6
  colors:
    positive: '#D32F2F'
    negative: '#1565C0'
    neutral: '#202428'
  image_fields:
  - time
  - frame
  - zoom
  - pixel
  timeseries_fields:
  - sample_time
  - sample
  - values
  text_fields:
  - timestamp
  - cursor
  - value
depth_visualization:
  enabled: true  # Apply color mapping only while previewing depth images.
  colormap: turbo  # grayscale, jet, turbo, viridis, inferno, plasma, or magma.
  range_mode: manual  # auto uses each frame; manual uses min/max below.
  min_value: 200.0  # Lower display bound in native depth units.
  max_value: 800.0  # Upper display bound in native depth units.
  contrast_power: 1.0  # Values below 1.0 emphasize near-depth differences.
  invalid_value: 0.0  # Native value rendered with invalid_color.
  invalid_color: [0, 0, 0]  # RGB preview color for invalid pixels.
  stream_name_tokens: [depth, disparity]  # Stream names treated as depth.
  source_type_tokens: [16uc1, 32fc1, mono16]  # ROS encodings treated as depth.
